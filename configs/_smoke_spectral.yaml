# Smoke-test config for the modular spectral pipeline. It uses the trivial
# dataset together with the spectral algorithm and a trivial baseline so the
# run is deterministic and exercises the new baseline registry.

name: smoke_spectral_pipeline
seed: 0

dataset:
  type: trivial
  params: {}

algorithm:
  type: spectral
  params:
    embedding_dim: 2
    normalization: auto
    seed: 0
    baseline: all_zeros
    baseline_params: {}

evals:
  - type: label_accuracy
