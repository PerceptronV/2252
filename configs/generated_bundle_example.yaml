# Example config for a graph bundle generated by scripts/datasets.py.

name: generated_sbm_peng
seed: 0

dataset:
  type: serialized_graph
  params:
    path: datasets/synthetic/sbm_40_40_40_seed0.npz

algorithm:
  type: spectral
  params:
    embedding_dim: 3
    normalization: auto
    seed: 0
    baseline: peng_kmeans
    baseline_params:
      n_init: 10
      max_iter: 300

evals:
  - type: label_accuracy
